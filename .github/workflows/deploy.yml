# ============================================================
# GitHub Actions — Deploy Astro site to GitHub Pages
# File: .github/workflows/deploy.yml
#
# Triggers: every push to the 'main' branch.
# Requires: Settings > Pages > Source = "GitHub Actions"
# ============================================================

name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main          # Change to 'master' if that's your default branch

  # Allows manual triggering from the Actions tab in GitHub
  workflow_dispatch:

# Grant the workflow permission to push to gh-pages
permissions:
  contents: read
  pages:    write
  id-token: write

# Prevent concurrent deployments — cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:

  # ── Job 1: Build ─────────────────────────────────────────────────
  build:
    name: Build Astro site
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js (LTS)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Set up GitHub Pages (configures baseURL and output path)
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      # 4. Install dependencies (clean install for reproducibility)
      - name: Install dependencies
        run: npm ci

      # 5. Build the Astro site
      - name: Build with Astro
        run: npm run build

      # 6. Upload the build artefact for the deploy job
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist        # Astro's default output directory

  # ── Job 2: Deploy ────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build             # Only runs after the build job succeeds

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
